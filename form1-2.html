<!-- form1-2.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form 1-2 | Zed Tuition - Documents & Videos</title>
<style>
  /* Same styles as grade10-12 page for consistency */
  :root{ --bg:#0f0f0f; --card:#161616; --hover:#1f1f1f; --text:#eaeaea; --border:#2a2a2a; --accent:#7c5cff; }
  body{ background:var(--bg); color:var(--text); font-family:'Segoe UI',Roboto,Arial; max-width:1200px; margin:auto; padding:15px; }
  .nav-home{ text-align:right; margin-bottom:10px; } .nav-home a{ color:var(--accent); text-decoration:none; }
  .subject-title{ margin:30px 0 10px; font-size:22px; border-bottom:1px solid var(--border); }
  .doc-banner{ background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; display:flex; align-items:center; margin-bottom:10px; cursor:pointer; position:relative; }
  .thumbnail{ width:60px; height:80px; margin-right:15px; border-radius:4px; overflow:hidden; background:#222; }
  .thumbnail img{ width:100%; height:100%; object-fit:cover; }
  .doc-title{ flex:1; }
  .menu-btn{ background:none; border:none; color:#fff; font-size:22px; }
  .menu-box{ position:absolute; right:10px; top:45px; background:#1b1b1b; border-radius:8px; width:200px; display:none; z-index:20; }
  .menu-box.active{ display:block; }
  .show-more{ padding:10px; text-align:center; background:var(--accent); border-radius:6px; cursor:pointer; margin-bottom:15px; }
  #viewer{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; }
  #viewer.active{ display:flex; }
  #viewer iframe{ width:90%; height:90%; border:none; }
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.75); display:none; align-items:center; justify-content:center; z-index:9999; }
  .popup{ background:#121212; padding:20px; border-radius:10px; max-width:850px; width:90%; max-height:80vh; overflow:auto; }
  .video-section{ margin-top:50px; }
  .video-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-top:20px; }
  .video-card{ background:var(--card); border-radius:12px; overflow:hidden; cursor:pointer; }
  .video-thumb img{ width:100%; aspect-ratio:16/9; object-fit:cover; }
  .video-card h4{ padding:12px; margin:0; }
  .loading{ text-align:center; padding:30px; color:#aaa; }
</style>
</head>
<body>
<div class="nav-home"><a href="index.html">🏠 Back to Home</a></div>
<h1>📗 Form 1 & 2 (Junior Secondary) Resources</h1>
<div id="viewer"><div id="closeViewer" onclick="closeViewer()">✕</div><iframe id="viewerFrame"></iframe></div>
<div id="docList"></div>
<div id="shareModal" class="overlay"><div class="popup"><h3>Share Document</h3><div id="shareOptions"></div><button class="btn-close" onclick="closeShare()">Close</button></div></div>
<div class="video-section" id="videos-section"><h2 class="subject-title">🎥 Video Lessons (Form 1-2)</h2><div id="videoContainer" class="video-grid"><div class="loading">Loading videos...</div></div></div>

<script>
const subjectsForm = {
 "English": [{ title:"English Form 1 & 2 Notes", id:"17ItMq9lm6OhUdJ7i8XSGpxCmcPfyBsHD" }],
 "Mathematics": [{ title:"Fast-learn Maths Junior", id:"1lB2ZePnvnqdPgd4rjX75CdQBR9XX5_nF" }],
 "Integrated Science": [{ title:"Science Form 1-2", id:"15Ykhm38JQoOxzIRiUpPRJTSpJck9Ktd6" }],
 "Literature in English": [{ title:"Literature Form 1", id:"1IoT_TJUwzB_m66ffor7jO5-nCwqpU6Tp" }],
 "Social Studies": [{ title:"Social Studies Junior", id:"1TYZKvFQrISYWQSLTUJ2SXOYeuL9fHW" }]
};
const listDiv = document.getElementById("docList");
function buildDocs(){
  Object.keys(subjectsForm).forEach(sub=>{
    const t=document.createElement("div"); t.className="subject-title"; t.textContent=sub; listDiv.appendChild(t);
    subjectsForm[sub].forEach(d=>listDiv.appendChild(createCard(d)));
  });
}
function createCard(doc){
  const b = document.createElement("div"); b.className="doc-banner";
  b.innerHTML = `<div class="thumbnail"><img src="https://drive.google.com/thumbnail?id=${doc.id}"></div><div class="doc-title">${doc.title}</div><button class="menu-btn">⋮</button><div class="menu-box"><button onclick="event.stopPropagation();openDocView('${doc.id}')">👁 View</button><button onclick="event.stopPropagation();shareDoc('${doc.id}')">🔗 Share</button></div>`;
  b.addEventListener("click",(e)=>{ if(!e.target.closest(".menu-btn")) openDocView(doc.id); });
  b.querySelector(".menu-btn").onclick=e=>{ e.stopPropagation(); document.querySelectorAll(".menu-box").forEach(m=>m.classList.remove("active")); b.querySelector(".menu-box").classList.toggle("active"); };
  return b;
}
function openDocView(id){ document.getElementById("viewer").classList.add("active"); document.getElementById("viewerFrame").src=`https://drive.google.com/file/d/${id}/preview`; }
function closeViewer(){ document.getElementById("viewer").classList.remove("active"); document.getElementById("viewerFrame").src=""; }
function shareDoc(id){ const link=location.href.split("#")[0]+"?doc="+id; const opts=document.getElementById("shareOptions"); opts.innerHTML=`<button onclick="navigator.clipboard.writeText('${link}')">📋 Copy Link</button><button onclick="window.open('https://wa.me/?text=${encodeURIComponent(link)}')">WhatsApp</button>`; document.getElementById("shareModal").style.display="flex"; }
function closeShare(){ document.getElementById("shareModal").style.display="none"; }
buildDocs();

// Video extraction for Form 1-2
async function fetchVideos(){
  const container = document.getElementById("videoContainer");
  container.innerHTML = '<div class="loading">📡 Fetching lessons...</div>';
  try {
    const proxy = "https://api.allorigins.win/raw?url="+encodeURIComponent("https://amimollc.github.io/extralearnsearch");
    const res = await fetch(proxy);
    if(!res.ok) throw new Error();
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html,"text/html");
    const links = doc.querySelectorAll("a");
    let videos=[];
    links.forEach(link=>{
      let href=link.href;
      if(href.includes("youtube.com/watch")||href.includes("youtu.be/")){
        let text=(link.innerText+" "+ (link.parentElement?.innerText||"")).toLowerCase();
        if(text.includes("form 1")||text.includes("form 2")||text.includes("junior")||text.includes("grade 8")||text.includes("grade 9")){
          let id=""; if(href.includes("youtu.be/")) id=href.split("youtu.be/")[1]?.split(/[?#]/)[0];
          else if(href.includes("v=")) id=href.split("v=")[1]?.split("&")[0];
          if(id && !videos.some(v=>v.id===id)) videos.push({title:link.innerText.trim().substring(0,70),id:id,url:`https://www.youtube.com/embed/${id}`});
        }
      }
    });
    if(videos.length) displayVideos(videos.slice(0,12));
    else throw new Error();
  } catch(e){ displayVideos(fallbackJunior); }
}
function displayVideos(videos){
  const container = document.getElementById("videoContainer");
  if(!videos.length){ container.innerHTML="<div>No videos found</div>"; return; }
  container.innerHTML="";
  videos.forEach(v=>{
    const card = document.createElement("div"); card.className="video-card";
    card.innerHTML = `<div class="video-thumb"><img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"></div><h4>${v.title}</h4>`;
    card.onclick = ()=>{ const modalDiv = document.createElement("div"); modalDiv.style.cssText="position:fixed;inset:0;background:black;z-index:30000;display:flex;align-items:center;justify-content:center;"; modalDiv.innerHTML=`<iframe width="90%" height="70%" src="${v.url}?autoplay=1" frameborder="0" allowfullscreen></iframe><button style="position:absolute;top:20px;right:30px;background:#7c5cff;border:none;padding:8px 16px;border-radius:30px;" onclick="this.parentNode.remove()">Close</button>`; document.body.appendChild(modalDiv); };
    container.appendChild(card);
  });
}
const fallbackJunior = [
  { title:"Form 1 English - Parts of Speech", id:"o4X5DvVYw3c", url:"https://www.youtube.com/embed/o4X5DvVYw3c" },
  { title:"Mathematics: Algebra for Form 2", id:"L3LMbpZIKhQ", url:"https://www.youtube.com/embed/L3LMbpZIKhQ" },
  { title:"Integrated Science - Cells", id:"URUJD5NEXC8", url:"https://www.youtube.com/embed/URUJD5NEXC8" },
  { title:"Literature - Poetry Analysis", id:"m7N1X9WQfHc", url:"https://www.youtube.com/embed/m7N1X9WQfHc" }
];
fetchVideos();
</script>
</body>
  </html>
